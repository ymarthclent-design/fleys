<head>
    <meta charset="UTF-8">

</head>
<body>
  <header>
      <nav class="navbar">
        <div class="nav-container">
          <div class="logo">
            <img src="header.png" class="logo-image">
          </div>
          <ul class="nav-menu">
            <li class="nav-item">
              <a href="index.html" class="nav-link">Home</a>
            </li>
            <li class="nav-item dropdown">
              <a>Menu</a>
              <ul class="dropdown-menu">
                <li><a href="clayCrafts.html">Clay Crafts</a></li>
                <li><a href="FeltCrafts.html">Felt Crafts</a></li>
                
              </ul>
            </li>
            <li class="nav-item">
              <li><a href="clayCrafts.html">Clay Crafts</a></li>
            </li>
            <li class="nav-item">
              <li><a href="FeltCrafts.html">Felt Crafts</a></li>
            </li>
            <li class="nav-item">
              <a href="about.html" class="nav-link">About Us</a>
            </li>
            
            <li class="nav-item">
              <a href="cart.html" class="nav-link">🛒</a>
            </li>
            <li class="nav-item">
              <li><a href="login.html">Login</a></li>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    
    <div class="container">
        
        <section class="products-section">
            <h1>Our Products</h1>
            <div class="products-grid" id="productsGrid">
                
            </div>
        </section>
        
        <section class="cart-section">
            <h2>Shopping Cart</h2>
            <div class="cart-items" id="cartItems">
                <p class="empty-cart">Your cart is empty</p>
            </div>
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">₱0.00</span>
                </div>
                <div class="summary-row">
                    <span>Delivery:</span>
                    <span id="deliveryFee">₱0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">₱0.00</span>
                </div>
            </div>
        </section>
        
        <section class="checkout-section" id="checkoutSection">
            <h2>Checkout</h2>
            <form id="checkoutForm">
                <div class="form-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <div class="form-group">
                    <label for="address">Address *</label>
                    <input type="text" id="address" name="address" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label>Delivery Option *</label>
                    <div class="delivery-options">
                        <label class="delivery-option">
                            <input type="radio" name="delivery" value="standard" data-price="5.00" checked>
                            <div class="option-content">
                                <span class="option-name">Standard Delivery</span>
                                <span class="option-price">₱5.00 (5-7 days)</span>
                            </div>
                        </label>
                        <label class="delivery-option">
                            <input type="radio" name="delivery" value="express" data-price="15.00">
                            <div class="option-content">
                                <span class="option-name">Express Delivery</span>
                                <span class="option-price">₱15.00 (2-3 days)</span>
                            </div>
                        </label>
                        <label class="delivery-option">
                            <input type="radio" name="delivery" value="overnight" data-price="25.00">
                            <div class="option-content">
                                <span class="option-name">Overnight Delivery</span>
                                <span class="option-price">₱25.00 (Next day)</span>
                            </div>
                        </label>
                    </div>
                
                <div class="payment-section">
    <h2>Mode of Payment</h2>

    <label class="payment-option">
        <input type="checkbox" name="payment" value="COD">
        <span class="custom-checkbox"></span>
        Cash on Delivery
    </label>

    
                    <label for="gcash">Gcash *</label>
                    <input type="tel" id="gcash" name="gcash">
     
    <label>    
                <button type="submit" class="checkout-btn">Complete Order</button>
    </label>

    
</div>
            </form>
        </section>
    </div>
<script src="script.js"></script>
</body>
</html>
